<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scam Wallet Tracker - Pi Crypto Forum</title>
    <link rel="icon" type="image/png" href="/static/img/title_icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#1a1a1c',
                        surface: '#252529',
                        surfaceHighlight: '#323236',
                        primary: '#d4b693',
                        secondary: '#e4e4e7',
                        textMain: '#f4f4f5',
                        textMuted: '#a1a1aa',
                        success: '#86efac',
                        danger: '#fda4af',
                        warning: '#fde68a',
                    },
                },
            },
        };
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next@23.7.6/i18next.min.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css?v=4">
</head>
<body class="bg-background text-textMain min-h-screen" data-page="scam-list">
    <nav class="sticky top-0 z-50 bg-surface/95 backdrop-blur-xl border-b border-white/5 px-4 py-3">
        <div class="max-w-6xl mx-auto flex items-center justify-between gap-3">
            <a href="/static/forum/index.html" class="flex items-center gap-2 text-secondary font-bold hover:text-primary transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                <span data-i18n="safety.backToForum">Back to Forum</span>
            </a>
            <div class="font-bold text-lg text-primary text-center" data-i18n="safety.trackerTitle">Scam Wallet Tracker</div>
            <div class="flex items-center gap-2">
                <button onclick="toggleScamLanguage()" class="px-3 py-2 rounded-lg border border-white/10 text-sm text-textMuted hover:text-secondary hover:border-primary/40 transition">
                    <span id="lang-toggle-label">中文</span>
                </button>
                <button id="btn-submit-report" class="bg-primary text-background px-4 py-2 rounded-lg font-bold hover:opacity-90 transition">
                    <i data-lucide="alert-triangle" class="w-4 h-4 inline-block mr-1"></i>
                    <span data-i18n="safety.submitButton">Submit Report</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4">
        <div class="bg-surface border border-white/5 rounded-2xl p-4 mb-6">
            <div class="flex gap-2">
                <input
                    type="text"
                    id="search-wallet"
                    data-i18n="safety.searchPlaceholder"
                    data-i18n-attr="placeholder"
                    placeholder="Search wallet address..."
                    class="flex-1 bg-background border border-white/10 rounded-xl px-4 py-2 text-textMain focus:border-primary outline-none"
                >
                <button id="btn-search" class="bg-primary text-background px-6 py-2 rounded-xl font-bold hover:opacity-90 transition">
                    <i data-lucide="search" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <div class="bg-surface border border-white/5 rounded-2xl p-4 mb-6">
            <div class="flex flex-wrap gap-3">
                <select id="filter-type" class="bg-background border border-white/10 rounded-lg px-3 py-2 text-textMain focus:border-primary outline-none">
                    <option value="" data-i18n="safety.filters.allTypes">All Types</option>
                </select>
                <select id="filter-status" class="bg-background border border-white/10 rounded-lg px-3 py-2 text-textMain focus:border-primary outline-none">
                    <option value="" data-i18n="safety.filters.allStatus">All Status</option>
                    <option value="verified" data-i18n="safety.filters.verified">Verified</option>
                    <option value="pending" data-i18n="safety.filters.pending">Pending</option>
                    <option value="disputed" data-i18n="safety.filters.disputed">Disputed</option>
                </select>
                <select id="sort-by" class="bg-background border border-white/10 rounded-lg px-3 py-2 text-textMain focus:border-primary outline-none">
                    <option value="latest" data-i18n="safety.filters.latest">Latest</option>
                    <option value="most_voted" data-i18n="safety.filters.mostVoted">Most Voted</option>
                    <option value="most_viewed" data-i18n="safety.filters.mostViewed">Most Viewed</option>
                </select>
            </div>
        </div>

        <div id="report-list" class="space-y-4">
            <div class="text-center text-textMuted py-8" data-i18n="safety.loadingReports">Loading reports...</div>
        </div>

        <div class="text-center mt-6">
            <button id="btn-load-more" class="bg-surfaceHighlight text-secondary px-6 py-3 rounded-xl font-bold hover:bg-white/10 transition hidden" data-i18n="safety.loadMore">
                Load More
            </button>
        </div>
    </main>

    <div id="toast-container" class="fixed top-24 right-4 z-[100] flex flex-col gap-2"></div>

    <script src="/static/config.js"></script>
    <script src="/static/js/logger.js"></script>
    <script src="/static/js/app.js?v=54"></script>
    <script src="/static/js/auth.js?v=58"></script>
    <script src="/static/js/apiKeyManager.js?v=48"></script>
    <script src="/static/js/i18n.js?v=8"></script>
    <script src="/static/scam-tracker/js/scam-tracker.js?v=48"></script>
    <script src="/static/scam-tracker/js/scam-tracker-i18n.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof initializeAuth === 'function') initializeAuth();
            if (window.I18n) await window.I18n.init();
            if (typeof ScamTrackerApp !== 'undefined') await ScamTrackerApp.initListPage();
            lucide.createIcons();
        });
    </script>
</body>
</html>
