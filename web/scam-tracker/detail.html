<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Detail - Scam Wallet Tracker</title>
    <link rel="icon" type="image/png" href="/static/img/title_icon.png">
    <link rel="stylesheet" href="/static/css/tailwind-built.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/i18next@23.7.6/i18next.min.js" crossorigin="anonymous"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css?v=4">
</head>
<body class="bg-background text-textMain min-h-screen" data-page="scam-detail">
    <nav class="sticky top-0 z-50 bg-surface/95 backdrop-blur-xl border-b border-white/5 px-4 py-3">
        <div class="max-w-4xl mx-auto flex items-center justify-between gap-3">
            <a href="/static/scam-tracker/index.html" class="flex items-center gap-2 text-secondary font-bold hover:text-primary transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                <span data-i18n="safety.backToReports">Back to Reports</span>
            </a>
            <div class="font-bold text-lg text-primary text-center" data-i18n="safety.reportDetail">Report Detail</div>
            <button onclick="toggleScamLanguage()" class="px-3 py-2 rounded-lg border border-white/10 text-sm text-textMuted hover:text-secondary hover:border-primary/40 transition">
                <span id="lang-toggle-label">中文</span>
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        <div id="report-detail" class="bg-surface border border-white/5 rounded-2xl p-6 mb-6">
            <div class="text-center text-textMuted py-8" data-i18n="safety.loadingDetail">Loading report detail...</div>
        </div>

        <div class="bg-surface border border-white/5 rounded-2xl p-6 mb-6">
            <h3 class="font-bold text-secondary mb-4" data-i18n="safety.voteSection">Community Review</h3>
            <div class="flex items-center gap-4 mb-4">
                <button id="btn-approve" class="flex-1 bg-success/10 hover:bg-success/20 text-success border border-success/30 py-3 rounded-xl font-bold transition flex items-center justify-center gap-2">
                    <i data-lucide="thumbs-up" class="w-5 h-5"></i>
                    <span><span data-i18n="safety.voteApprove">Approve</span> (<span id="count-approve">0</span>)</span>
                </button>
                <button id="btn-reject" class="flex-1 bg-danger/10 hover:bg-danger/20 text-danger border border-danger/30 py-3 rounded-xl font-bold transition flex items-center justify-center gap-2">
                    <i data-lucide="thumbs-down" class="w-5 h-5"></i>
                    <span><span data-i18n="safety.voteReject">Reject</span> (<span id="count-reject">0</span>)</span>
                </button>
            </div>
            <div class="bg-background rounded-xl p-4">
                <div class="flex justify-between text-sm text-textMuted mb-2">
                    <span data-i18n="safety.voteProgress">Approval Ratio</span>
                    <span id="vote-percentage">0%</span>
                </div>
                <div class="h-2 bg-surfaceHighlight rounded-full overflow-hidden">
                    <div id="vote-progress-bar" class="h-full bg-primary transition-all duration-300" style="width: 0%"></div>
                </div>
                <p class="text-xs text-textMuted mt-2 text-center" data-i18n="safety.voteHint">
                    When at least 10 votes are collected and approval exceeds 70%, the report can be auto-verified.
                </p>
            </div>
        </div>

        <div class="bg-surface border border-white/5 rounded-2xl p-6">
            <h3 class="font-bold text-secondary mb-4 flex items-center gap-2">
                <i data-lucide="message-circle" class="w-5 h-5"></i>
                <span data-i18n="safety.commentsTitle">Evidence & Comments</span>
            </h3>
            <div id="comment-form" class="mb-6 hidden">
                <textarea
                    id="comment-content"
                    data-i18n="safety.commentPlaceholder"
                    data-i18n-attr="placeholder"
                    placeholder="Share verifiable evidence or context. PRO members can comment here..."
                    class="w-full bg-background border border-white/10 rounded-xl p-3 text-textMain focus:border-primary outline-none min-h-[100px] mb-2"
                ></textarea>
                <input
                    type="text"
                    id="comment-tx-hash"
                    data-i18n="safety.commentTxPlaceholder"
                    data-i18n-attr="placeholder"
                    placeholder="Transaction hash (optional)"
                    class="w-full bg-background border border-white/10 rounded-xl px-3 py-2 text-textMain focus:border-primary outline-none mb-3"
                >
                <div class="flex justify-end">
                    <button id="btn-submit-comment" class="bg-primary text-background px-6 py-2 rounded-lg font-bold hover:opacity-90 transition" data-i18n="safety.submitComment">
                        Submit Comment
                    </button>
                </div>
            </div>
            <div id="comments-list" class="space-y-4">
                <div class="text-center text-textMuted py-4" data-i18n="safety.loadingComments">Loading comments...</div>
            </div>
        </div>
    </main>

    <div id="toast-container" role="status" aria-live="polite" aria-atomic="true"
        class="fixed z-[110] flex flex-col gap-3 pointer-events-none bottom-4 left-4 right-4 items-center md:bottom-auto md:top-24 md:left-auto md:right-4 md:items-end"
        style="bottom: var(--shell-toast-bottom, calc(1rem + env(safe-area-inset-bottom, 0px)));"></div>

    <script src="/static/config.js"></script>
    <script src="/static/js/logger.js"></script>
    <script src="/static/js/ui-shell.js?v=1"></script>
    <script src="/static/js/app.js?v=55"></script>
    <script src="/static/js/auth.js?v=60"></script>
    <script src="/static/js/apiKeyManager.js?v=48"></script>
    <script src="/static/js/i18n.js?v=9"></script>
    <script src="/static/scam-tracker/js/scam-tracker.js?v=48"></script>
    <script src="/static/scam-tracker/js/scam-tracker-i18n.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (typeof initializeAuth === 'function') initializeAuth();
            if (window.I18n) await window.I18n.init();
            if (typeof ScamTrackerApp !== 'undefined') await ScamTrackerApp.initDetailPage();
            lucide.createIcons();
        });
    </script>
</body>
</html>
