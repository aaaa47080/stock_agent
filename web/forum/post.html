<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Post Detail - Pi Crypto Forum</title>
    <link rel="icon" type="image/png" href="/static/img/title_icon.png">
    <link rel="stylesheet" href="/static/css/tailwind-built.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css?v=4">
    <script src="/static/config.js"></script>
    <script src="/static/js/logger.js"></script>
    <style>
        .prose p { margin-bottom: 1em; line-height: 1.8; }
        .prose ul, .prose ol { margin-bottom: 1em; padding-left: 1.5em; }
        .prose ul { list-style-type: disc; }
        .prose ol { list-style-type: decimal; }
        .prose h1, .prose h2, .prose h3 {
            color: #f5f5f5; font-weight: 800;
            margin-top: 1.6em; margin-bottom: 0.6em; line-height: 1.3;
        }
        .prose code {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 6px; padding: 0.15em 0.4em; font-family: 'JetBrains Mono', monospace;
        }
        .prose pre {
            background: #0f0f15; border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 1em 1.1em; overflow-x: auto; margin-bottom: 1em;
        }
        .prose pre code { background: transparent; border: 0; padding: 0; }
        .prose blockquote {
            margin: 1em 0; padding: 0.9em 1em;
            border-left: 3px solid #d4b693; background: rgba(212,182,147,0.06); color: #c7c7d1;
        }
        .action-btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 700;
            border: 1px solid; transition: all 0.18s; cursor: pointer; white-space: nowrap;
        }
    </style>
</head>
<body class="bg-background text-textMain min-h-screen flex flex-col" data-page="post" style="background:#0b0b12">
    <div aria-hidden="true" class="pointer-events-none absolute inset-x-0 top-0 h-[220px] bg-[linear-gradient(180deg,rgba(212,182,147,0.10),transparent)]"></div>

    <!-- Nav -->
    <nav class="sticky top-0 z-50 bg-background/95 backdrop-blur-xl border-b border-white/5 px-4 py-3">
        <div class="max-w-2xl mx-auto flex items-center gap-3">
            <a href="/static/index.html#forum" id="forum-back-link"
               class="shrink-0 flex items-center gap-1.5 text-sm text-textMuted font-semibold hover:text-primary transition p-1.5 -ml-1.5 rounded-full hover:bg-white/5">
                <i data-lucide="arrow-left" class="w-4 h-4"></i>
                <span>返回</span>
            </a>
            <span class="text-sm font-bold text-secondary truncate flex-1 text-center">文章內容</span>
            <div class="w-14 shrink-0 flex justify-end gap-1" id="nav-author-actions"></div>
        </div>
    </nav>

    <main class="flex-1 max-w-2xl mx-auto w-full px-3 pb-24 pt-4 sm:px-4">

        <!-- Article Card -->
        <article class="rounded-[24px] border border-white/8 bg-surface/70 overflow-hidden mb-4">

            <!-- Article Header -->
            <div class="px-5 pt-5 pb-4 border-b border-white/5">
                <div class="flex items-center gap-2 flex-wrap mb-3">
                    <span id="post-category"
                        class="shrink-0 text-[10px] font-bold uppercase tracking-[0.18em] px-3 py-1.5 rounded-full border border-primary/25 bg-primary/12 text-primary">
                        Analysis
                    </span>
                    <a id="post-author" href="#" class="text-sm font-semibold text-secondary hover:text-primary transition truncate">User</a>
                    <span class="text-textMuted/30 text-xs">·</span>
                    <span id="post-date" class="text-xs text-textMuted/60">Date</span>
                </div>
                <h1 id="post-title" class="text-xl font-extrabold leading-tight text-textMain sm:text-2xl">載入中...</h1>
            </div>

            <!-- Article Body -->
            <div class="px-5 py-5">
                <div id="post-content" class="prose max-w-none text-[15px] leading-7 text-textMuted/90 mb-4"></div>
                <div id="post-tags" class="flex flex-wrap gap-2"></div>
            </div>

            <!-- Action Bar -->
            <div class="px-5 pb-5 pt-1 border-t border-white/5 flex flex-wrap items-center gap-2">
                <!-- Votes -->
                <button id="btn-push"
                    class="action-btn border-white/8 bg-background/50 text-textMuted hover:text-success hover:border-success/30 hover:bg-success/8">
                    <i data-lucide="thumbs-up" class="w-4 h-4"></i>
                    <span id="stat-push">0</span>
                </button>
                <button id="btn-boo"
                    class="action-btn border-white/8 bg-background/50 text-textMuted hover:text-danger hover:border-danger/30 hover:bg-danger/8">
                    <i data-lucide="thumbs-down" class="w-4 h-4"></i>
                    <span id="stat-boo">0</span>
                </button>

                <div class="flex-1"></div>

                <!-- Reply / Tip -->
                <button id="btn-reply"
                    class="action-btn border-white/8 bg-background/50 text-textMuted hover:text-secondary hover:border-white/15 hover:bg-white/5">
                    <i data-lucide="message-square" class="w-4 h-4"></i>
                    <span>回覆</span>
                </button>
                <button id="btn-tip"
                    class="action-btn border-primary/20 bg-primary/10 text-primary hover:bg-primary/18 hover:border-primary/35">
                    <i data-lucide="gift" class="w-4 h-4"></i>
                    <span data-price="tip"><i data-lucide="loader" class="w-3 h-3 animate-spin inline-block"></i></span>
                </button>
                <button id="btn-report-post"
                    class="action-btn border-white/8 bg-background/50 text-textMuted/50 hover:text-danger hover:border-danger/25 hover:bg-danger/8 !px-3">
                    <i data-lucide="flag" class="w-4 h-4"></i>
                </button>
            </div>
        </article>

        <!-- Reply Form -->
        <div id="reply-form" class="hidden rounded-[20px] border border-white/8 bg-surface/60 p-5 mb-4 animate-fade-in-down">
            <h3 class="mb-3 font-bold text-secondary text-sm">發表回覆</h3>
            <textarea id="reply-content"
                class="mb-3 min-h-[110px] w-full rounded-[16px] border border-white/8 bg-background/60 px-4 py-3 text-textMain text-sm outline-none ring-0 transition focus:border-primary/50 placeholder-textMuted/40 resize-none"
                placeholder="分享你的想法..."></textarea>
            <div class="flex justify-end gap-2.5">
                <button onclick="document.getElementById('reply-form').classList.add('hidden')"
                    class="px-4 py-2 text-sm text-textMuted hover:text-secondary rounded-full hover:bg-white/5 transition">取消</button>
                <button id="submit-reply"
                    class="px-6 py-2 text-sm font-bold rounded-full bg-primary text-background hover:opacity-90 transition">送出回覆</button>
            </div>
        </div>

        <!-- Comments -->
        <section class="rounded-[20px] border border-white/8 bg-surface/50 overflow-hidden">
            <div class="px-5 py-4 border-b border-white/5 flex items-center gap-2">
                <i data-lucide="message-circle" class="w-4 h-4 text-textMuted/60"></i>
                <h3 class="text-sm font-bold text-secondary">留言</h3>
            </div>
            <div id="comments-list" class="divide-y divide-white/[0.04] px-5">
                <div class="py-6 text-center text-sm text-textMuted/50">載入留言中...</div>
            </div>
        </section>
    </main>

    <!-- Toast -->
    <div id="toast-container" role="status" aria-live="polite" aria-atomic="true"
        class="fixed z-[110] flex flex-col gap-3 pointer-events-none bottom-4 left-4 right-4 items-center md:bottom-auto md:top-24 md:left-auto md:right-4 md:items-end"
        style="bottom: var(--shell-toast-bottom, calc(1rem + env(safe-area-inset-bottom, 0px)));"></div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="fixed inset-0 bg-background/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-surface w-full max-w-sm p-6 rounded-3xl border border-white/10 shadow-2xl">
            <div id="confirm-modal-icon" class="w-14 h-14 rounded-full flex items-center justify-center mx-auto mb-5 bg-warning/20">
                <i data-lucide="alert-circle" class="w-7 h-7 text-warning"></i>
            </div>
            <h3 id="confirm-modal-title" class="text-lg font-bold text-center text-secondary mb-2">Confirm</h3>
            <p id="confirm-modal-message" class="text-textMuted text-center text-sm mb-5">Are you sure?</p>
            <div id="confirm-modal-buttons" class="flex gap-3">
                <button id="confirm-modal-cancel" class="flex-1 py-3 bg-surfaceHighlight hover:bg-white/10 text-textMuted font-bold rounded-2xl transition border border-white/5">Cancel</button>
                <button id="confirm-modal-confirm" class="flex-1 py-3 bg-primary hover:brightness-110 text-background font-bold rounded-2xl transition">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Report Modal -->
    <div id="report-modal" class="fixed inset-0 bg-background/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-surface w-full max-w-md p-6 rounded-3xl border border-white/10 shadow-2xl">
            <div class="flex items-center justify-between mb-5">
                <h3 class="text-base font-bold text-secondary flex items-center gap-2">
                    <i data-lucide="flag" class="w-4 h-4 text-danger"></i> 檢舉內容
                </h3>
                <button id="report-modal-close" class="text-textMuted hover:text-secondary p-1 rounded-full hover:bg-white/5 transition">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form id="report-form" class="space-y-4">
                <input type="hidden" id="report-content-type" value="post">
                <input type="hidden" id="report-content-id">
                <div id="report-error" class="hidden bg-danger/10 border border-danger/20 text-danger text-sm p-3 rounded-xl flex items-start gap-2">
                    <i data-lucide="alert-circle" class="w-4 h-4 mt-0.5 shrink-0"></i>
                    <span id="report-error-msg"></span>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-textMuted mb-2">檢舉原因</label>
                    <select id="report-type" required class="w-full bg-background border border-white/10 rounded-xl p-3 text-sm text-textMain focus:border-primary outline-none">
                        <option value="">請選擇原因</option>
                        <option value="spam">垃圾內容</option>
                        <option value="harassment">騷擾</option>
                        <option value="misinformation">錯誤資訊</option>
                        <option value="scam">詐騙</option>
                        <option value="illegal">違法內容</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-textMuted mb-2">補充說明 <span class="text-textMuted/50">(選填)</span></label>
                    <textarea id="report-description" rows="3"
                        class="w-full bg-background border border-white/10 rounded-xl p-3 text-sm text-textMain focus:border-primary outline-none resize-none"
                        placeholder="請補充需要審核的重點"></textarea>
                </div>
                <div class="text-xs text-textMuted/70 bg-white/4 rounded-xl p-3 space-y-1">
                    <p class="font-semibold mb-1">檢舉提醒</p>
                    <p>· 僅檢舉違反社群規範的內容</p>
                    <p>· 惡意檢舉可能造成帳號限制</p>
                </div>
                <div class="flex gap-3 pt-1">
                    <button type="button" id="report-modal-cancel" class="flex-1 py-3 bg-surfaceHighlight hover:bg-white/10 text-textMuted font-bold rounded-2xl transition border border-white/5 text-sm">取消</button>
                    <button type="submit" class="flex-1 py-3 bg-danger hover:bg-danger/80 text-white font-bold rounded-2xl transition text-sm">送出檢舉</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="/static/js/security-utils.js"></script>
    <script type="module" src="/static/js/utils.js?v=1"></script>
    <script type="module" src="/static/js/store.js?v=1"></script>
    <script type="module" src="/static/js/ui-shell.js?v=1"></script>
    <script type="module" src="/static/js/app.js?v=55"></script>
    <script type="module" src="/static/js/api-client.js?v=1"></script>
    <script type="module" src="/static/js/apiKeyManager.js?v=48"></script>
    <script type="module" src="/static/js/auth.js?v=60"></script>
    <script type="module" src="/static/js/forum-config.js?v=3"></script>
    <script type="module" src="/static/js/forum-api.js?v=2"></script>
    <script type="module" src="/static/js/forum-app.js?v=7"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const backLink = document.getElementById('forum-back-link');
            if (backLink) {
                backLink.href = sessionStorage.getItem('forumBackHref') || '/static/index.html#forum';
            }
            if (typeof initializeAuth === 'function') await initializeAuth();
            if (typeof ForumApp !== 'undefined') ForumApp.init();
            initReportModal();
        });

        function initReportModal() {
            const reportBtn = document.getElementById('btn-report-post');
            const modal = document.getElementById('report-modal');
            const closeBtn = document.getElementById('report-modal-close');
            const cancelBtn = document.getElementById('report-modal-cancel');
            const form = document.getElementById('report-form');

            if (!reportBtn) return;

            reportBtn.addEventListener('click', function () {
                const postId = ForumApp?.currentPostId;
                if (postId) {
                    document.getElementById('report-content-id').value = postId;
                    document.getElementById('report-content-type').value = 'post';
                    const errorDiv = document.getElementById('report-error');
                    if (errorDiv) errorDiv.classList.add('hidden');
                    modal.classList.remove('hidden');
                }
            });

            const closeModal = () => { modal.classList.add('hidden'); form.reset(); };
            closeBtn?.addEventListener('click', closeModal);
            cancelBtn?.addEventListener('click', closeModal);
            modal?.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

            form?.addEventListener('submit', async function (e) {
                e.preventDefault();
                const contentType = document.getElementById('report-content-type').value;
                const contentId = document.getElementById('report-content-id').value;
                const reportType = document.getElementById('report-type').value;
                const description = document.getElementById('report-description').value;
                const errorDiv = document.getElementById('report-error');
                const errorMsg = document.getElementById('report-error-msg');

                const showError = (msg) => {
                    if (errorDiv && errorMsg) {
                        errorMsg.textContent = msg;
                        errorDiv.classList.remove('hidden');
                    } else { showToast(msg, 'error'); }
                };

                if (!reportType) { showError('請先選擇檢舉原因'); return; }
                if (errorDiv) errorDiv.classList.add('hidden');

                try {
                    const token = (typeof AuthManager !== 'undefined' && AuthManager.currentUser?.accessToken) || localStorage.getItem('access_token');
                    if (!token) { showToast('請先登入', 'error'); return; }

                    const response = await fetch('/api/governance/reports', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({ content_type: contentType, content_id: parseInt(contentId, 10), report_type: reportType, description })
                    });

                    const result = await response.json();
                    if (!response.ok || !result.success) { showError(result.detail || '送出檢舉失敗'); return; }

                    showToast('檢舉已送出', 'success');
                    closeModal();
                } catch (error) {
                    showError('送出檢舉失敗');
                    console.error('Report submit error:', error);
                }
            });
        }
    </script>
</body>
</html>
