<!doctype html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pi Crypto Forum</title>
    <link rel="icon" type="image/png" href="/static/img/title_icon.png" />
    <link rel="stylesheet" href="/static/css/tailwind-built.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23.7.6/i18next.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css?v=4" />
    <script src="/static/config.js"></script>
    <script src="/static/js/logger.js"></script>
    <style>
        .scroll-x-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .scroll-x-hide::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="relative min-h-screen overflow-x-hidden bg-background text-textMain flex flex-col" data-page="index">
    <div aria-hidden="true" class="pointer-events-none absolute inset-x-0 top-0 h-[320px] bg-[linear-gradient(180deg,rgba(212,182,147,0.14),transparent)]"></div>
    <div aria-hidden="true" class="pointer-events-none absolute -left-16 top-24 h-40 w-40 rounded-full bg-primary/8 blur-3xl"></div>

    <nav class="sticky top-0 z-50 border-b border-white/6 bg-background/94 px-4 py-3 backdrop-blur-xl">
        <div class="max-w-3xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="/static/index.html" class="p-1.5 hover:bg-white/5 rounded-full text-textMuted hover:text-primary transition">
                    <i data-lucide="home" class="w-4 h-4"></i>
                </a>
                <span class="font-bold text-base text-primary tracking-wide">Pi Forum</span>
            </div>
            <div class="flex items-center gap-1.5">
                <div class="auth-only hidden flex items-center gap-1">
                    <a href="/static/forum/dashboard.html" class="p-1.5 hover:bg-white/5 rounded-full text-textMuted hover:text-primary transition">
                        <i data-lucide="user" class="w-4 h-4"></i>
                    </a>
                    <a href="/static/forum/create.html" class="flex items-center gap-1 bg-primary/15 hover:bg-primary/25 text-primary px-3 py-1.5 rounded-full text-sm font-bold transition">
                        <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                        <span>發文</span>
                    </a>
                </div>
                <div class="guest-only">
                    <button onclick="safePiLogin()" class="bg-primary/15 hover:bg-primary/25 text-primary px-3 py-1.5 rounded-full text-sm font-bold transition">
                        登入
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="sticky top-[52px] z-40 bg-background/96 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-3xl mx-auto px-4 pt-4 pb-3">
            <!-- Header Row -->
            <div class="flex items-center justify-between mb-3">
                <span class="inline-flex items-center gap-2 px-4 py-2 rounded-full border border-primary/20 bg-primary/10 text-primary text-xs font-bold">
                    <i data-lucide="sparkles" class="w-3.5 h-3.5"></i>
                    Community Board
                </span>
                <span class="text-textMuted/60 text-sm hidden sm:block">分享觀點、提問、學習</span>
            </div>

            <!-- Category Filter -->
            <div class="rounded-2xl border border-white/5 bg-surface/60 p-4 backdrop-blur-sm">
                <div class="flex items-center gap-3 overflow-x-auto scroll-x-hide pb-2">
                    <select id="category-filter"
                        class="appearance-none shrink-0 rounded-xl border border-white/10 bg-background/80 px-4 py-2.5 text-xs font-bold text-textMuted outline-none transition focus:border-primary/50 focus:ring-2 focus:ring-primary/20">
                        <option value="" data-i18n="forum.allCategories">全部分類</option>
                        <option value="analysis" data-i18n="forum.categoryAnalysis">分析</option>
                        <option value="question" data-i18n="forum.categoryQuestion">請問</option>
                        <option value="tutorial" data-i18n="forum.categoryTutorial">學習</option>
                        <option value="news" data-i18n="forum.categoryNews">新聞</option>
                        <option value="chat" data-i18n="forum.categoryChat">閒聊</option>
                        <option value="insight" data-i18n="forum.categoryInsight">心得</option>
                    </select>
                    <div id="trending-tags" class="flex items-center gap-2.5 min-w-0 overflow-x-auto scroll-x-hide flex-1">
                        <span class="text-xs text-textMuted/40 italic">載入中...</span>
                    </div>
                </div>

                <!-- Active Filter Indicator -->
                <div id="active-post-filters" class="hidden mt-3 pt-3 border-t border-white/5 flex items-center gap-2.5">
                    <span class="text-xs text-textMuted/60">已篩選：</span>
                    <span id="active-post-filters-text" class="text-xs font-medium text-primary bg-primary/10 px-3.5 py-1.5 rounded-full border border-primary/15"></span>
                    <button id="clear-post-filters" type="button" class="text-xs text-textMuted hover:text-primary transition p-1 ml-auto">
                        <i data-lucide="x" class="w-3.5 h-3.5"></i>
                    </button>
                </div>
            </div>

            <!-- Quick Stats Row -->
            <div class="mt-4 grid grid-cols-3 gap-3">
                <div class="rounded-xl border border-white/5 bg-surface/40 p-3 text-center">
                    <div class="text-lg font-bold text-primary" id="forum-stat-posts">--</div>
                    <div class="text-[10px] text-textMuted/60 uppercase tracking-wider">文章</div>
                </div>
                <div class="rounded-xl border border-white/5 bg-surface/40 p-3 text-center">
                    <div class="text-lg font-bold text-accent" id="forum-stat-users">--</div>
                    <div class="text-[10px] text-textMuted/60 uppercase tracking-wider">用戶</div>
                </div>
                <div class="rounded-xl border border-white/5 bg-surface/40 p-3 text-center">
                    <div class="text-lg font-bold text-success" id="forum-stat-comments">--</div>
                    <div class="text-[10px] text-textMuted/60 uppercase tracking-wider">回覆</div>
                </div>
            </div>
        </div>
    </div>

    <main class="relative z-10 flex-1 max-w-3xl mx-auto w-full px-3 py-6 pb-28">
        <div id="active-post-filters" class="hidden mb-5 flex items-center gap-2.5">
            <span class="text-xs text-textMuted/60">篩選：</span>
            <span id="active-post-filters-text" class="text-xs font-medium text-primary bg-primary/10 px-3.5 py-1.5 rounded-full border border-primary/15"></span>
            <button id="clear-post-filters" type="button" class="text-xs text-textMuted hover:text-primary transition">
                <i data-lucide="x" class="w-3.5 h-3.5"></i>
            </button>
        </div>

        <div id="post-list" class="space-y-5"></div>
    </main>

    <div id="toast-container" role="status" aria-live="polite" aria-atomic="true" class="fixed z-[110] flex flex-col gap-3 pointer-events-none bottom-4 left-4 right-4 items-center md:bottom-auto md:top-24 md:left-auto md:right-4 md:items-end" style="bottom: var(--shell-toast-bottom, calc(1rem + env(safe-area-inset-bottom, 0px)))"></div>

    <div id="confirm-modal" class="fixed inset-0 bg-background/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-surface w-full max-w-sm p-6 rounded-3xl border border-white/10 shadow-2xl">
            <div id="confirm-modal-icon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6 bg-warning/20">
                <i data-lucide="alert-circle" class="w-8 h-8 text-warning"></i>
            </div>
            <h3 id="confirm-modal-title" class="text-xl font-bold text-center text-secondary mb-2">Confirm</h3>
            <p id="confirm-modal-message" class="text-textMuted text-center text-sm mb-6">Are you sure?</p>
            <div id="confirm-modal-buttons" class="flex gap-3">
                <button id="confirm-modal-cancel" class="flex-1 py-3 bg-surfaceHighlight hover:bg-white/10 text-textMuted font-bold rounded-2xl transition border border-white/5">Cancel</button>
                <button id="confirm-modal-confirm" class="flex-1 py-3 bg-primary hover:brightness-110 text-background font-bold rounded-2xl transition shadow-lg">Confirm</button>
            </div>
        </div>
    </div>

    <script type="module" src="/static/js/utils.js?v=1"></script>
    <script type="module" src="/static/js/store.js?v=1"></script>
    <script type="module" src="/static/js/ui-shell.js?v=1"></script>
    <script type="module" src="/static/js/nav-config.js?v=7"></script>
    <script type="module" src="/static/js/i18n.js?v=9"></script>
    <script type="module" src="/static/js/components/LanguageSwitcher.js?v=3"></script>
    <script type="module" src="/static/js/global-nav.js?v=2"></script>
    <script type="module" src="/static/js/app.js?v=55"></script>
    <script type="module" src="/static/js/api-client.js?v=1"></script>
    <script type="module" src="/static/js/apiKeyManager.js?v=48"></script>
    <script type="module" src="/static/js/auth.js?v=60"></script>
    <script type="module" src="/static/js/premium.js?v=43"></script>
    <script type="module" src="/static/js/forum-config.js?v=3"></script>
    <script type="module" src="/static/js/forum-api.js?v=2"></script>
    <script type="module" src="/static/js/forum-app.js?v=6"></script>
    <script type="module" src="/static/js/friends.js?v=5"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (window.I18n) {
                try { await window.I18n.init(); } catch (e) { console.error('[Forum] i18n Init Error:', e); }
            }
            if (typeof AuthManager !== 'undefined') {
                await AuthManager.init();
            }
            if (typeof ForumApp !== 'undefined') {
                ForumApp.init();
            }
            lucide.createIcons();
        });
    </script>
</body>
</html>
