<!doctype html>
<html lang="zh-TW" class="dark">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Pi Crypto Forum</title>
        <link rel="icon" type="image/png" href="/static/img/title_icon.png" />

        <!-- Core Libraries -->
        <link rel="stylesheet" href="/static/css/tailwind-built.css">
        <script src="https://cdn.jsdelivr.net/npm/i18next@23.7.6/i18next.min.js"></script>
        <script src="https://unpkg.com/lucide@latest"></script>
        <script src="https://sdk.minepi.com/pi-sdk.js"></script>
        <!-- Pi.init() called by JS with correct sandbox setting -->
        <link
            href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/static/styles.css?v=4" />
        <script src="/static/config.js"></script>
        <script src="/static/js/logger.js"></script>
    </head>

    <body class="bg-background text-textMain min-h-screen flex flex-col" data-page="index" style="background:#0b0b12">
        <!-- Navbar -->
        <nav
            class="sticky top-0 z-50 bg-surface/95 backdrop-blur-xl border-b border-white/5 px-4 py-3"
        >
            <div class="max-w-6xl mx-auto flex items-center justify-between">
                <!-- 返回主頁 + Logo -->
                <div class="flex items-center gap-3">
                    <a
                        href="/static/index.html"
                        class="p-2 hover:bg-white/5 rounded-full text-textMuted hover:text-primary transition"
                        title="返回主頁"
                    >
                        <i data-lucide="home" class="w-5 h-5"></i>
                    </a>
                    <a
                        href="/static/forum/index.html"
                        class="font-bold text-lg text-primary tracking-wide"
                    >
                        Pi Forum
                    </a>
                </div>

                <!-- 右側按鈕區 -->
                <div class="flex items-center gap-2">
                    <!-- 已登入狀態 -->
                    <div class="auth-only hidden flex items-center gap-1">
                        <!-- 個人中心 -->
                        <a
                            href="/static/forum/dashboard.html"
                            class="p-2 hover:bg-white/5 rounded-full text-textMuted hover:text-primary transition"
                            title="個人中心"
                        >
                            <i data-lucide="user" class="w-5 h-5"></i>
                        </a>
                        <!-- 發文 -->
                        <a
                            href="/static/forum/create.html"
                            class="bg-primary/10 hover:bg-primary/20 text-primary px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-1 transition ml-1"
                        >
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            <span class="hidden sm:inline">發文</span>
                        </a>
                    </div>
                    <!-- 未登入狀態 -->
                    <div class="guest-only">
                        <button
                            onclick="safePiLogin()"
                            class="bg-primary/10 hover:bg-primary/20 text-primary px-3 py-1.5 rounded-lg text-sm font-bold transition"
                        >
                            登入
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 max-w-6xl mx-auto w-full px-2.5 pb-24 pt-4 md:px-6 md:pb-12 grid grid-cols-1 md:grid-cols-4 gap-4 md:gap-6">
            <!-- Sidebar (Filters & Trending) -->
            <aside class="md:col-span-1 space-y-4 md:space-y-6">
                <div class="rounded-[24px] bg-surface/95 p-3.5 md:rounded-[28px] md:p-4 shadow-[0_18px_40px_rgba(0,0,0,0.22)]">
                    <h3 class="font-bold text-secondary flex items-center gap-2">
                        <i data-lucide="filter" class="w-4 h-4"></i> Filter
                    </h3>
                    <p class="mt-1 mb-3 text-xs leading-relaxed text-textMuted">Browse posts by category with a cleaner mobile layout.</p>
                    <div class="space-y-2">
                        <label for="category-filter" class="text-[11px] font-semibold uppercase tracking-[0.22em] text-textMuted/70">Category</label>
                        <select
                            id="category-filter"
                            class="appearance-none w-full bg-background/80 rounded-2xl px-3 py-3 text-sm text-textMain outline-none ring-1 ring-white/6 focus:ring-primary/35"
                        >
                            <option value="">All Categories</option>
                            <option value="analysis">Analysis [分析]</option>
                            <option value="question">Question [請益]</option>
                            <option value="tutorial">Tutorial [教學]</option>
                            <option value="news">News [新聞]</option>
                            <option value="chat">Chat [閒聊]</option>
                            <option value="insight">Insight [心得]</option>
                        </select>
                    </div>
                </div>

                <div class="rounded-[24px] bg-surface/95 p-3.5 md:rounded-[28px] md:p-4 shadow-[0_18px_40px_rgba(0,0,0,0.22)]">
                    <h3 class="font-bold text-secondary flex items-center gap-2">
                        <i data-lucide="trending-up" class="w-4 h-4"></i> Trending Tags
                    </h3>
                    <p class="mt-1 mb-3 text-xs leading-relaxed text-textMuted">Tap a tag chip to narrow the feed instantly.</p>
                    <div id="trending-tags" class="flex flex-wrap gap-2">
                        <!-- Loaded via JS -->
                        <div class="text-xs text-textMuted">Loading...</div>
                    </div>
                </div>
                <div id="active-post-filters" class="hidden rounded-[22px] bg-gradient-to-r from-primary/10 to-transparent px-3.5 py-3 md:rounded-[24px] md:px-4 shadow-[0_14px_32px_rgba(0,0,0,0.16)]">
                    <div class="flex items-center justify-between gap-3">
                        <div class="min-w-0">
                            <div class="text-[11px] font-semibold uppercase tracking-[0.22em] text-primary/70">Active Filter</div>
                            <div id="active-post-filters-text" class="mt-1 text-sm font-medium text-textMain"></div>
                        </div>
                        <button
                            id="clear-post-filters"
                            type="button"
                            class="shrink-0 rounded-full bg-white/5 px-3 py-1.5 text-xs font-semibold text-primary transition hover:bg-primary/10"
                        >
                            Clear
                        </button>
                    </div>
                </div>
            </aside>

            <!-- Post List -->
            <div class="md:col-span-3">
                <div id="post-list" class="space-y-4 md:space-y-5">
                    <!-- Posts injected here -->
                </div>
            </div>
        </main>

        <!-- Toast Container -->
        <div
            id="toast-container"
            role="status"
            aria-live="polite"
            aria-atomic="true"
            class="fixed z-[110] flex flex-col gap-3 pointer-events-none bottom-4 left-4 right-4 items-center md:bottom-auto md:top-24 md:left-auto md:right-4 md:items-end"
            style="bottom: var(--shell-toast-bottom, calc(1rem + env(safe-area-inset-bottom, 0px)))"
        ></div>

        <!-- Confirm Modal -->
        <div
            id="confirm-modal"
            class="fixed inset-0 bg-background/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4"
        >
            <div
                class="bg-surface w-full max-w-sm p-6 rounded-3xl border border-white/10 shadow-2xl transform transition-all scale-100 opacity-100"
            >
                <div
                    id="confirm-modal-icon"
                    class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6 bg-warning/20"
                >
                    <i data-lucide="alert-circle" class="w-8 h-8 text-warning"></i>
                </div>
                <h3
                    id="confirm-modal-title"
                    class="text-xl font-bold text-center text-secondary mb-2"
                >
                    Confirm
                </h3>
                <p id="confirm-modal-message" class="text-textMuted text-center text-sm mb-6">
                    Are you sure?
                </p>
                <div id="confirm-modal-buttons" class="flex gap-3">
                    <button
                        id="confirm-modal-cancel"
                        class="flex-1 py-3 bg-surfaceHighlight hover:bg-white/10 text-textMuted font-bold rounded-2xl transition border border-white/5"
                    >
                        Cancel
                    </button>
                    <button
                        id="confirm-modal-confirm"
                        class="flex-1 py-3 bg-primary hover:brightness-110 text-background font-bold rounded-2xl transition shadow-lg"
                    >
                        Confirm
                    </button>
                </div>
            </div>
        </div>

        <!-- Scripts -->
        <script type="module" src="/static/js/utils.js?v=1"></script>
    <script type="module" src="/static/js/store.js?v=1"></script>
    <script type="module" src="/static/js/ui-shell.js?v=1"></script>
        <script src="/static/js/nav-config.js?v=7"></script>
        <script src="/static/js/i18n.js?v=9"></script>
        <script src="/static/js/components/LanguageSwitcher.js?v=3"></script>
        <script src="/static/js/global-nav.js?v=2"></script>
        <script type="module" src="/static/js/app.js?v=55"></script>
        <script type="module" src="/static/js/api-client.js?v=1"></script>
        <script type="module" src="/static/js/apiKeyManager.js?v=48"></script>
        <script type="module" src="/static/js/auth.js?v=60"></script>
        <script type="module" src="/static/js/premium.js?v=43"></script>
        <script type="module" src="/static/js/forum-config.js?v=3"></script>
        <script type="module" src="/static/js/forum-api.js?v=2"></script>
        <script type="module" src="/static/js/forum-app.js?v=5"></script>
        <script type="module" src="/static/js/friends.js?v=5"></script>
        <script>
            document.addEventListener('DOMContentLoaded', async () => {
                // 1. 初始化 i18n（必須先完成，才能正確翻譯導覽列）
                if (window.I18n) {
                    try {
                        await window.I18n.init();
                        window.APP_CONFIG?.DEBUG_MODE && console.log('[Forum] i18n ready');
                    } catch (e) {
                        console.error('[Forum] i18n Init Error:', e);
                    }
                }

                // 2. 初始化認證（等待完成）
                if (typeof AuthManager !== 'undefined') {
                    await AuthManager.init();
                }

                // 3. 初始化 ForumApp
                if (typeof ForumApp !== 'undefined') {
                    ForumApp.init();
                }

                lucide.createIcons();
            });
        </script>

        <!-- Footer -->
        <footer class="bg-surface/95 border-t border-white/5 mt-12 py-8">
            <div class="max-w-6xl mx-auto px-4">
                <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="text-center md:text-left">
                        <p class="text-xs text-textMuted">
                            © 2026 PI CryptoMind. All rights reserved.
                        </p>
                    </div>
                    <div class="flex flex-wrap justify-center gap-4">
                        <a
                            href="/static/legal/terms-of-service.html"
                            class="text-xs text-textMuted hover:text-primary transition"
                            >Terms of Service</a
                        >
                        <a
                            href="/static/legal/privacy-policy.html"
                            class="text-xs text-textMuted hover:text-primary transition"
                            >Privacy Policy</a
                        >
                        <a
                            href="/static/legal/community-guidelines.html"
                            class="text-xs text-textMuted hover:text-primary transition"
                            >Community Guidelines</a
                        >
                    </div>
                </div>
            </div>
        </footer>
    </body>
</html>
