<!doctype html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pi Crypto Forum</title>
    <link rel="icon" type="image/png" href="/static/img/title_icon.png" />
    <link rel="stylesheet" href="/static/css/tailwind-built.css">
    <script src="https://cdn.jsdelivr.net/npm/i18next@23.7.6/i18next.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css?v=4" />
    <script src="/static/config.js"></script>
    <script src="/static/js/logger.js"></script>
    <style>
        .scroll-x-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .scroll-x-hide::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="relative min-h-screen overflow-x-hidden bg-background text-textMain flex flex-col" data-page="index" style="background:linear-gradient(180deg,#111017 0%,#0b0b11 100%)">
    <div aria-hidden="true" class="pointer-events-none absolute inset-x-0 top-0 h-[280px] bg-[linear-gradient(180deg,rgba(212,182,147,0.08),transparent)]"></div>

    <nav class="sticky top-0 z-50 border-b border-white/6 bg-[#111017]/94 px-4 py-3 backdrop-blur-xl">
        <div class="max-w-3xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="/static/index.html" class="p-1.5 hover:bg-white/5 rounded-full text-textMuted hover:text-primary transition">
                    <i data-lucide="home" class="w-4 h-4"></i>
                </a>
                <span class="font-bold text-base text-primary tracking-wide">Pi Forum</span>
            </div>
            <div class="flex items-center gap-1.5">
                <div class="auth-only hidden flex items-center gap-1">
                    <a href="/static/forum/dashboard.html" class="p-1.5 hover:bg-white/5 rounded-full text-textMuted hover:text-primary transition">
                        <i data-lucide="user" class="w-4 h-4"></i>
                    </a>
                    <a href="/static/forum/create.html" class="flex items-center gap-1 bg-primary/15 hover:bg-primary/25 text-primary px-3 py-1.5 rounded-full text-sm font-bold transition">
                        <i data-lucide="plus" class="w-3.5 h-3.5"></i>
                        <span>發文</span>
                    </a>
                </div>
                <div class="guest-only">
                    <button onclick="safePiLogin()" class="bg-primary/15 hover:bg-primary/25 text-primary px-3 py-1.5 rounded-full text-sm font-bold transition">
                        登入
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="sticky top-[52px] z-40 bg-[#111017]/96 backdrop-blur-xl border-b border-white/5">
        <div class="max-w-3xl mx-auto">
            <div class="px-4 pt-4 pb-2">
                <div class="rounded-[24px] border border-white/6 bg-[#17151d] px-5 py-5">
                    <p class="text-[11px] uppercase tracking-[0.22em] text-primary/70">Community Board</p>
                    <h1 class="mt-1 text-2xl font-extrabold tracking-tight text-textMain">Pi Forum</h1>
                    <p class="mt-2 text-sm leading-6 text-textMuted">看分析、問問題、分享心得。這裡保留論壇感，不做花俏 landing page，也不讓資訊黏成一團。</p>
                </div>
            </div>

            <div class="flex gap-2 px-4 pt-3 pb-2 overflow-x-auto scroll-x-hide" id="category-pills">
                <button type="button" data-category="" class="category-pill shrink-0 inline-flex items-center gap-1 px-3.5 py-1.5 rounded-full text-xs font-bold transition whitespace-nowrap border border-[#d4b693]/50 bg-[#d4b693]/15 text-[#d4b693]">
                    全部
                </button>
                <button type="button" data-category="analysis" class="category-pill shrink-0 inline-flex items-center gap-1 px-3.5 py-1.5 rounded-full text-xs font-bold transition whitespace-nowrap border border-white/8 text-textMuted hover:border-amber-400/40 hover:text-amber-400 hover:bg-amber-400/8">
                    分析
                </button>
                <button type="button" data-category="question" class="category-pill shrink-0 inline-flex items-center gap-1 px-3.5 py-1.5 rounded-full text-xs font-bold transition whitespace-nowrap border border-white/8 text-textMuted hover:border-blue-400/40 hover:text-blue-400 hover:bg-blue-400/8">
                    請問
                </button>
                <button type="button" data-category="tutorial" class="category-pill shrink-0 inline-flex items-center gap-1 px-3.5 py-1.5 rounded-full text-xs font-bold transition whitespace-nowrap border border-white/8 text-textMuted hover:border-emerald-400/40 hover:text-emerald-400 hover:bg-emerald-400/8">
                    學習
                </button>
                <button type="button" data-category="news" class="category-pill shrink-0 inline-flex items-center gap-1 px-3.5 py-1.5 rounded-full text-xs font-bold transition whitespace-nowrap border border-white/8 text-textMuted hover:border-violet-400/40 hover:text-violet-400 hover:bg-violet-400/8">
                    新聞
                </button>
                <button type="button" data-category="chat" class="category-pill shrink-0 inline-flex items-center gap-1 px-3.5 py-1.5 rounded-full text-xs font-bold transition whitespace-nowrap border border-white/8 text-textMuted hover:border-rose-400/40 hover:text-rose-400 hover:bg-rose-400/8">
                    閒聊
                </button>
                <button type="button" data-category="insight" class="category-pill shrink-0 inline-flex items-center gap-1 px-3.5 py-1.5 rounded-full text-xs font-bold transition whitespace-nowrap border border-white/8 text-textMuted hover:border-cyan-400/40 hover:text-cyan-400 hover:bg-cyan-400/8">
                    心得
                </button>
            </div>

            <div class="flex items-center gap-2 px-4 pb-3 overflow-x-auto scroll-x-hide">
                <span class="shrink-0 text-[10px] font-bold uppercase tracking-[0.12em] text-textMuted/40">熱門</span>
                <div id="trending-tags" class="flex items-center gap-1.5 min-w-0">
                    <span class="text-xs text-textMuted/40 italic">載入中...</span>
                </div>
            </div>
        </div>
    </div>

    <main class="relative z-10 flex-1 max-w-3xl mx-auto w-full px-3 py-5 pb-28">
        <div id="active-post-filters" class="hidden mb-3 flex items-center gap-2">
            <span class="text-xs text-textMuted/60">篩選：</span>
            <span id="active-post-filters-text" class="text-xs font-medium text-primary bg-primary/10 px-2.5 py-1 rounded-full"></span>
            <button id="clear-post-filters" type="button" class="text-xs text-textMuted hover:text-primary transition">
                <i data-lucide="x" class="w-3 h-3"></i>
            </button>
        </div>

        <div id="post-list" class="space-y-3.5"></div>
    </main>

    <select id="category-filter" class="hidden"></select>

    <div id="toast-container" role="status" aria-live="polite" aria-atomic="true" class="fixed z-[110] flex flex-col gap-3 pointer-events-none bottom-4 left-4 right-4 items-center md:bottom-auto md:top-24 md:left-auto md:right-4 md:items-end" style="bottom: var(--shell-toast-bottom, calc(1rem + env(safe-area-inset-bottom, 0px)))"></div>

    <div id="confirm-modal" class="fixed inset-0 bg-background/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-surface w-full max-w-sm p-6 rounded-3xl border border-white/10 shadow-2xl">
            <div id="confirm-modal-icon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6 bg-warning/20">
                <i data-lucide="alert-circle" class="w-8 h-8 text-warning"></i>
            </div>
            <h3 id="confirm-modal-title" class="text-xl font-bold text-center text-secondary mb-2">Confirm</h3>
            <p id="confirm-modal-message" class="text-textMuted text-center text-sm mb-6">Are you sure?</p>
            <div id="confirm-modal-buttons" class="flex gap-3">
                <button id="confirm-modal-cancel" class="flex-1 py-3 bg-surfaceHighlight hover:bg-white/10 text-textMuted font-bold rounded-2xl transition border border-white/5">Cancel</button>
                <button id="confirm-modal-confirm" class="flex-1 py-3 bg-primary hover:brightness-110 text-background font-bold rounded-2xl transition shadow-lg">Confirm</button>
            </div>
        </div>
    </div>

    <script type="module" src="/static/js/utils.js?v=1"></script>
    <script type="module" src="/static/js/store.js?v=1"></script>
    <script type="module" src="/static/js/ui-shell.js?v=1"></script>
    <script src="/static/js/nav-config.js?v=7"></script>
    <script src="/static/js/i18n.js?v=9"></script>
    <script src="/static/js/components/LanguageSwitcher.js?v=3"></script>
    <script src="/static/js/global-nav.js?v=2"></script>
    <script type="module" src="/static/js/app.js?v=55"></script>
    <script type="module" src="/static/js/api-client.js?v=1"></script>
    <script type="module" src="/static/js/apiKeyManager.js?v=48"></script>
    <script type="module" src="/static/js/auth.js?v=60"></script>
    <script type="module" src="/static/js/premium.js?v=43"></script>
    <script type="module" src="/static/js/forum-config.js?v=3"></script>
    <script type="module" src="/static/js/forum-api.js?v=2"></script>
    <script type="module" src="/static/js/forum-app.js?v=5"></script>
    <script type="module" src="/static/js/friends.js?v=5"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (window.I18n) {
                try { await window.I18n.init(); } catch (e) { console.error('[Forum] i18n Init Error:', e); }
            }
            if (typeof AuthManager !== 'undefined') {
                await AuthManager.init();
            }
            if (typeof ForumApp !== 'undefined') {
                ForumApp.init();
            }
            lucide.createIcons();
        });
    </script>
</body>
</html>
