apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-agent-api
spec:
  template:
    spec:
      containers:
        - name: stock-agent-api
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
              ephemeral-storage: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
              ephemeral-storage: "4Gi"
          volumeMounts:
            - name: app-tmp
              mountPath: /tmp
            - name: app-data
              mountPath: /app/data
      volumes:
        - name: app-tmp
          emptyDir:
            sizeLimit: "1Gi"
        - name: app-data
          emptyDir:
            sizeLimit: "2Gi"
