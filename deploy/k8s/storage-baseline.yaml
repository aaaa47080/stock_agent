apiVersion: v1
kind: LimitRange
metadata:
  name: stock-agent-default-limits
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: "250m"
        memory: "512Mi"
        ephemeral-storage: "1Gi"
      default:
        cpu: "1000m"
        memory: "2Gi"
        ephemeral-storage: "4Gi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: stock-agent-namespace-quota
spec:
  hard:
    requests.cpu: "4"
    requests.memory: "8Gi"
    requests.ephemeral-storage: "8Gi"
    limits.cpu: "8"
    limits.memory: "16Gi"
    limits.ephemeral-storage: "16Gi"
    pods: "20"
