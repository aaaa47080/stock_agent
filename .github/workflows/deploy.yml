name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -t cryptomind:${{ github.sha }} .

      - name: Verify Vite build output exists
        run: |
          docker run --rm cryptomind:${{ github.sha }} python -c "
          import os
          assets_dir = '/app/web/assets'
          assert os.path.isdir(assets_dir), f'assets/ directory not found'
          bundle_js = [f for f in os.listdir(assets_dir) if f.startswith('index-') and f.endswith('.js')]
          assert len(bundle_js) == 1, f'Expected 1 bundle JS in assets/, got: {bundle_js}'
          size = os.path.getsize(os.path.join(assets_dir, bundle_js[0]))
          assert size > 50000, f'Bundle too small ({size} bytes), Vite build may have failed'
          print(f'OK: bundle = assets/{bundle_js[0]} ({size} bytes)')
          "

      - name: Verify no raw JS files in production
        run: |
          docker run --rm cryptomind:${{ github.sha }} python -c "
          import os
          js_dir = '/app/web/js'
          if os.path.exists(js_dir):
              raw_js = [f for f in os.listdir(js_dir) if f.endswith('.js')]
              assert len(raw_js) == 0, f'Raw JS files found in production: {raw_js}'
              print('OK: no raw JS files in web/js/')
          else:
              print('OK: web/js/ not present')
          "

      - name: Verify Lucide CDN pinned version
        run: |
          docker run --rm cryptomind:${{ github.sha }} python -c "
          import re
          index_path = '/app/web/index.html'
          with open(index_path) as f:
              html = f.read()
          assert 'unpkg.com/lucide@0.577.0' in html, 'ERROR: Pinned Lucide CDN version not found!'
          print('OK: Lucide CDN pinned at v0.577.0')
          "

      - name: Smoke test - run container and verify endpoints
        run: |
          docker run --rm -d --name smoke -p 8080:8080 \
            -e DATABASE_URL=postgresql://test:test@localhost:5432/test \
            -e REDIS_URL=memory:// \
            -e SECRET_KEY=test-secret \
            -e JWT_SECRET_KEY=test-jwt-secret-1234567890 \
            -e PI_API_KEY=test \
            -e PI_WALLET_PRIVATE_SEED=test \
            -e TEST_MODE=true \
            -e TEST_MODE_CONFIRMATION=I_UNDERSTAND_THE_RISKS \
            cryptomind:${{ github.sha }}
          sleep 20
          echo "1. Health check..."
          curl -sf http://localhost:8080/health || { echo "FAIL: health"; docker stop smoke; exit 1; }
          
          echo "2. Index page loads..."
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:8080/)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: index ($STATUS)"
            docker stop smoke
            exit 1
          fi
          
          echo "3. Vite bundle served..."
          INDEX_HTML=$(curl -sf http://localhost:8080/)
          BUNDLE=$(echo "$INDEX_HTML" | sed -n 's|.*\/static\/assets\/index-[a-zA-Z0-9]*\.js.*|\0|p' | head -1 | sed 's|^/static||')
          if [ -z "$BUNDLE" ]; then
            echo "FAIL: no Vite bundle in index.html"
            docker stop smoke
            exit 1
          fi
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "http://localhost:8080/static$BUNDLE")
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: bundle $BUNDLE → $STATUS"
            docker stop smoke
            exit 1
          fi
          echo "  OK: $BUNDLE ($STATUS)"
          
          echo "4. CSS loaded..."
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" http://localhost:8080/static/css/tailwind-built.css)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: CSS ($STATUS)"
            docker stop smoke
            exit 1
          fi
          
          docker stop smoke
          echo "=== All smoke tests passed ==="
        timeout-minutes: 2

      - name: Tag as latest
        run: docker tag cryptomind:${{ github.sha }} cryptomind:latest

  auto-rollback:
    runs-on: ubuntu-latest
    needs: [build]
    if: failure() && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 5
          ref: ${{ github.sha }}

      - name: Notify failure
        run: |
          echo "::warning::Deployment failed at ${{ github.sha }}. Manual rollback may be needed."
