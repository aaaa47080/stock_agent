name: E2E Tests

on:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      REDIS_URL: memory://
      SECRET_KEY: test-secret-key-for-testing
      JWT_SECRET_KEY: test-jwt-secret-key-for-testing-1234567890
      PI_API_KEY: test-pi-api-key
      PI_WALLET_PRIVATE_SEED: test-wallet-seed
      TEST_MODE: "true"
      TEST_MODE_CONFIRMATION: I_UNDERSTAND_THE_RISKS
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio playwright

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Run E2E tests
        run: |
          pytest -o addopts='-v --tb=short --no-cov' -m e2e \
            --ignore=tests/test_agent_scenarios.py \
            --ignore=tests/test_pi_routing_fix.py \
            --ignore=tests/test_router_governance_routes.py \
            --ignore=tests/test_router_market.py \
            --ignore=tests/test_router_market_extended.py \
            --ignore=tests/e2e/test_static_asset_load_smoke.py
