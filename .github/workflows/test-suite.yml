name: Test Suite

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      REDIS_URL: memory://
      SECRET_KEY: test-secret-key-for-testing
      JWT_SECRET_KEY: test-jwt-secret-key-for-testing-1234567890
      PI_API_KEY: test-pi-api-key
      PI_WALLET_PRIVATE_SEED: test-wallet-seed
      TEST_MODE: "true"
      TEST_MODE_CONFIRMATION: I_UNDERSTAND_THE_RISKS
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pip-audit playwright

      - name: Run dependency vulnerability audit
        run: |
          pip-audit -r requirements.txt --no-deps --disable-pip
        continue-on-error: true

      - name: Run critical backend tests
        run: |
          pytest -o addopts='' \
            tests/test_analysis_mode_access.py \
            tests/test_analysis_policy.py \
            tests/test_analysis_response_metadata.py \
            tests/test_api_models.py \
            tests/test_tool_access_resolver.py \
            -q

      - name: Check static asset references
        run: python scripts/check_static_refs.py

      - name: Check static asset version consistency
        run: python scripts/check_asset_versions.py

  e2e-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      REDIS_URL: memory://
      SECRET_KEY: test-secret-key-for-testing
      JWT_SECRET_KEY: test-jwt-secret-key-for-testing-1234567890
      PI_API_KEY: test-pi-api-key
      PI_WALLET_PRIVATE_SEED: test-wallet-seed
      TEST_MODE: "true"
      TEST_MODE_CONFIRMATION: I_UNDERSTAND_THE_RISKS
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio playwright

      - name: Build frontend
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Install Playwright browsers
        run: python -m playwright install chromium

      - name: Run E2E tests
        run: |
          pytest -o addopts='' \
            tests/e2e/test_non_pi_browser_gate.py \
            tests/e2e/test_frontend_interaction_smoke.py \
            tests/e2e/test_market_ui_smoke.py \
            tests/e2e/test_verified_mode_market_flow.py \
            -q
        continue-on-error: true
